spring.application.name=LifeSyncBackend

# Local development database. This lets the app run before PostgreSQL is ready.
spring.datasource.url=jdbc:h2:mem:lifesync-dev;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate database schema auto-update
spring.jpa.hibernate.ddl-auto=update

# H2 console and Flyway migrations
spring.h2.console.enabled=true
spring.flyway.enabled=false

# Security credentials
spring.security.user.name=admin
spring.security.user.password=admin123

# Local dev port. Use a stable port so browser/API URLs do not change every run.
server.port=8085
server.tomcat.basedir=./tomcat-temp