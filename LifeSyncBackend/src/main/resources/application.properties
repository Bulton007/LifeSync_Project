spring.application.name=LifeSyncBackend

################################################
# PostgreSQL
################################################

spring.datasource.url=jdbc:postgresql://localhost:5432/lifesync
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

################################################
# Hibernate
################################################

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

################################################
# Flyway
################################################

spring.flyway.enabled=false

################################################
# Server
################################################

server.port=8085
server.tomcat.basedir=./tomcat-temp

################################################
# JWT
################################################

jwt.secret=YourSuperSecretKeyMustBeAtLeast256BitsLongForHS256Algorithm123456789
jwt.expiration=86400000

################################################
# Mail
################################################

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_EMAIL@gmail.com
spring.mail.password=YOUR_GOOGLE_APP_PASSWORD

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true